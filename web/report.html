<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Update - No Refunds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="report">
  <div id="site-nav"></div>
  <div class="app-shell">
    <main class="container section">
      <div class="page-heading">
        <p class="eyebrow">Owner Update</p>
        <h1 id="reportCampaignTitle">Post withdrawal report.</h1>
      </div>
      <div class="form-page-layout">
        <form id="reportForm" class="form-card" style="width: 100%;">
          <h2 class="section-title">Report Details</h2>
          <div id="reportError" class="error hidden"></div>
          <div class="form-grid">
            <div class="field">
              <label for="reportTitle">Report Title</label>
              <input id="reportTitle" name="reportTitle" required minlength="5">
            </div>
            <div class="field">
              <label for="amount">Amount</label>
              <input id="amount" name="amount" type="number" min="0.01" step="0.01" required>
            </div>
            <div class="field">
              <label for="images">Images</label>
              <input id="images" name="images" type="file" accept="image/png,image/jpeg" multiple>
            </div>
            <button class="button button-action button-wide" type="submit">Post Update</button>
          </div>
        </form>
        <aside id="reportCampaignSummary" class="surface-panel form-side">
          <span class="loader">Loading campaign</span>
        </aside>
      </div>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
