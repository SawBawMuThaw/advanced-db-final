<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Refunds - Campaigns</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
  <div id="site-nav"></div>
  <div class="app-shell">
    <main>
      <section class="container hero">
        <div class="hero-copy">
          <p class="eyebrow">Transparent charity crowdfunding</p>
          <h1>Fund campaigns with visible progress and public updates.</h1>
          <p>Explore open campaigns, support the work you trust, and follow owner reports after funds are used.</p>
          <form id="homeSearch" class="form-grid" style="max-width: 620px; margin-top: 24px;">
            <div class="field">
              <label for="homeSearchInput">Search campaigns</label>
              <input id="homeSearchInput" name="q" placeholder="Clean water, education, disaster relief">
            </div>
            <button class="button button-action" type="submit">
              <span class="material-symbols-outlined" aria-hidden="true">search</span>
              Search
            </button>
          </form>
        </div>
        <div class="hero-panel">
          <div class="impact-preview">
            <div class="impact-media">
              <span class="material-symbols-outlined" aria-hidden="true">diversity_1</span>
            </div>
            <div class="impact-stats">
              <div class="impact-stat">
                <strong>Live</strong>
                <span>progress</span>
              </div>
              <div class="impact-stat">
                <strong>Public</strong>
                <span>updates</span>
              </div>
              <div class="impact-stat">
                <strong>Secure</strong>
                <span>giving</span>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="container section">
        <div class="section-title-row">
          <div>
            <p class="eyebrow">Browse</p>
            <h2 class="section-title">Campaigns</h2>
          </div>
          <span id="pageLabel" class="badge badge-open">Page 1</span>
        </div>
        <div id="homeError" class="error hidden"></div>
        <div id="campaignGrid" class="campaign-grid" style="margin-top: 20px;"></div>
        <div class="pager">
          <button id="prevPage" class="button button-secondary" type="button">
            <span class="material-symbols-outlined" aria-hidden="true">chevron_left</span>
            Previous
          </button>
          <button id="nextPage" class="button button-secondary" type="button">
            Next
            <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
          </button>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
