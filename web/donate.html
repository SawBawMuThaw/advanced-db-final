<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - No Refunds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="donate">
  <div id="site-nav"></div>
  <div class="app-shell">
    <main class="container section">
      <div class="page-heading">
        <p class="eyebrow">Donation</p>
        <h1 id="donationCampaignTitle">Campaign</h1>
      </div>
      <div class="checkout-layout">
        <form id="donateForm" class="form-card" style="width: 100%;">
          <h2 class="section-title">Payment</h2>
          <div id="donateError" class="error hidden"></div>
          <div id="receiptNotice" class="notice hidden">A tax receipt will be automatically generated.</div>
          <div class="form-grid">
            <div class="field">
              <label for="paymentMethod">Payment Method</label>
              <select id="paymentMethod" name="paymentMethod">
                <option>VISA</option>
                <option>Mastercard</option>
              </select>
            </div>
            <div class="field">
              <label for="donationAmount">Amount</label>
              <input id="donationAmount" name="amount" type="number" min="0.01" step="0.01" required>
            </div>
            <div class="checkout-total">
              <span class="muted">Total</span>
              <strong id="donationTotal" class="stat-value">$0.00</strong>
            </div>
            <button class="button button-action button-wide" type="submit">
              <span class="material-symbols-outlined" aria-hidden="true">lock</span>
              Confirm Donation
            </button>
          </div>
        </form>
        <aside class="surface-panel checkout-summary">
          <h2 class="section-title">Campaign Progress</h2>
          <div id="donationSummary" style="margin-top: 18px;">
            <span class="loader">Loading campaign</span>
          </div>
        </aside>
      </div>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
