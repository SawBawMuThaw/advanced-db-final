<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Profile - No Refunds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">
  <div id="site-nav"></div>
  <div class="app-shell">
    <main class="container section">
      <div id="profileError" class="error hidden"></div>
      <section id="profileHeader" class="surface-panel profile-header">
        <span class="loader">Loading profile</span>
      </section>
      <section class="section-tight">
        <div class="section-title-row">
          <h2 class="section-title">Owned Campaigns</h2>
        </div>
        <div id="profileCampaigns" class="campaign-grid"></div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
